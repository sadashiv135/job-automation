name: Job Automation Pipeline

on:
  schedule:
    # Every 2 hours, Mon–Fri, 8am–8pm CDT (UTC-5)
    # CDT 8am=UTC 13:00, 10am=15, 12pm=17, 2pm=19, 4pm=21, 6pm=23, 8pm=01
    - cron: '0 13,15,17,19,21,23,1 * * 1-5'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Decode resume.docx from secret
        run: echo "${{ secrets.RESUME_DOCX_B64 }}" | base64 --decode > resume.docx

      - name: Verify resume exists
        run: |
          ls -la resume.docx
          python -c "
          from docx import Document
          doc = Document('resume.docx')
          print('Resume loaded OK, paragraphs:', len(doc.paragraphs))
          "

      - name: Create output directories
        run: mkdir -p resumes cover_letters

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python main.py

      - name: Upload resumes and cover letters
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-applications-${{ github.run_id }}
          path: |
            resumes/
            cover_letters/
          retention-days: 30

